services:
  apollo:
    build: .
    ports:
      - "8080:8080"
    environment:
      - XAI_API_KEY=${XAI_API_KEY:-}
    volumes:
      - ./target:/data/target:ro
      - ./data:/app/.apollo
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "=== Apollo ==="
        python main.py index /data/target -o .apollo/index.json
        python main.py status --index .apollo/index.json
        echo ""
        echo "Starting web UI..."
        python main.py serve --port 8080 --index .apollo/index.json
