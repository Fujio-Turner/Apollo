<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apollo — JSON Schemas</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #1f6feb;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
    }
    header h1 { font-size: 1.5rem; font-weight: 600; }
    header p { color: var(--muted); margin-top: 0.25rem; font-size: 0.9rem; }
    header a { color: var(--accent); text-decoration: none; }
    header a:hover { text-decoration: underline; }
    .container { max-width: 960px; margin: 0 auto; padding: 2rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      cursor: pointer;
      user-select: none;
    }
    .card-header:hover { background: rgba(88,166,255,0.06); }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .card-title .icon { font-size: 1.1rem; }
    .card-toggle {
      font-size: 0.8rem;
      color: var(--muted);
      margin-left: 0.75rem;
      transition: transform 0.2s;
    }
    .card.open .card-toggle { transform: rotate(90deg); }
    .card-body {
      display: none;
      border-top: 1px solid var(--border);
      padding: 1rem;
      max-height: 600px;
      overflow: auto;
    }
    .card.open .card-body { display: block; }
    pre {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.82rem;
      line-height: 1.5;
      white-space: pre;
      color: var(--text);
    }
    .json-key { color: var(--accent); }
    .json-string { color: var(--green); }
    .json-number { color: var(--orange); }
    .json-bool, .json-null { color: var(--red); }
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-weight: 600;
      background: var(--accent-dim);
      color: var(--text);
    }
    #loading { text-align: center; color: var(--muted); padding: 3rem; }
    #error { color: var(--red); text-align: center; padding: 2rem; display: none; }
  </style>
</head>
<body>

<header>
  <h1>📐 Apollo — JSON Schemas</h1>
  <p>
    JSON Schema definitions for the project's data structures.
    Conforming to <a href="https://json-schema.org/" target="_blank">JSON Schema 2020-12</a>.
  </p>
</header>

<div class="container">
  <div id="loading">Loading schemas…</div>
  <div id="error"></div>
  <div id="schemas"></div>
</div>

<script>
const SCHEMA_FILES = [
  "apollo-project.schema.json",
  "graph.schema.json",
  "node.schema.json",
  "edge.schema.json",
  "spatial.schema.json",
  "parser-output.schema.json",
  "search-result.schema.json",
  "node-detail.schema.json",
  "chat-thread.schema.json",
  "annotations.schema.json",
  "api-response.schema.json",
  "settings.schema.json",
  "reindex-history.schema.json",
];

function syntaxHighlight(json) {
  const str = JSON.stringify(json, null, 2);
  return str.replace(
    /("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
    (match) => {
      let cls = "json-number";
      if (/^"/.test(match)) {
        cls = /:$/.test(match) ? "json-key" : "json-string";
      } else if (/true|false/.test(match)) {
        cls = "json-bool";
      } else if (/null/.test(match)) {
        cls = "json-null";
      }
      return `<span class="${cls}">${match}</span>`;
    }
  );
}

async function loadSchemas() {
  const container = document.getElementById("schemas");
  const loading = document.getElementById("loading");
  const errorEl = document.getElementById("error");
  const results = [];

  for (const file of SCHEMA_FILES) {
    try {
      const resp = await fetch(file);
      if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
      const schema = await resp.json();
      results.push({ file, schema });
    } catch (e) {
      console.warn(`Failed to load ${file}:`, e);
    }
  }

  loading.style.display = "none";

  if (results.length === 0) {
    errorEl.textContent = "No schema files could be loaded. Make sure the *.schema.json files are in the same directory as this page.";
    errorEl.style.display = "block";
    return;
  }

  for (const { file, schema } of results) {
    const card = document.createElement("div");
    card.className = "card";

    const title = schema.title || file;
    const desc = schema.description || "";
    const requiredCount = (schema.required || []).length;
    const propCount = Object.keys(schema.properties || {}).length;

    card.innerHTML = `
      <div class="card-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="card-title">
          <span class="icon">📄</span>
          ${title}
          <span class="badge">${file}</span>
          ${propCount ? `<span class="badge">${propCount} props</span>` : ""}
          ${requiredCount ? `<span class="badge">${requiredCount} required</span>` : ""}
        </div>
        <span class="card-toggle">▶</span>
      </div>
      <div class="card-body">
        <p style="color:var(--muted);margin-bottom:0.75rem;font-size:0.85rem;">${desc}</p>
        <pre>${syntaxHighlight(schema)}</pre>
      </div>
    `;

    container.appendChild(card);
  }
}

loadSchemas();
</script>

</body>
</html>
