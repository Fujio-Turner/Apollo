[pytest]
# Tests live in two places:
#   1. ``tests/``                       — cross-cutting / multi-component tests
#   2. ``plugins/<name>/test_parser.py`` — per-plugin smoke tests, co-located
#                                          with each plugin so deleting the
#                                          plugin folder also deletes its tests.
testpaths = tests plugins
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
